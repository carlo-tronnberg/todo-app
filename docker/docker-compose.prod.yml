name: todo-app

# Production deployment — intended for the Asustor NAS.
# Set secrets via environment variables or Docker secrets.

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '${POSTGRES_PORT:-5434}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todo_prod}
      POSTGRES_USER: ${POSTGRES_USER:-todo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-todo_user} -d ${POSTGRES_DB:-todo_prod}']
      interval: 30s
      timeout: 5s
      retries: 5

  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-your-org}/todo-api:${TAG:-latest}
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-todo_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-todo_prod}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: '3000'
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  web:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-your-org}/todo-web:${TAG:-latest}
    ports:
      - '${WEB_PORT:-80}:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_prod_data:
