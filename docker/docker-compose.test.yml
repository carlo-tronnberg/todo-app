version: '3.9'

# Used by GitHub Actions CI and local test runs.
# Spins up a fresh Postgres, runs migrations, then unit + integration tests.

services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: todo_test
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_pass
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data # in-memory; discarded after container stops
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U todo_user -d todo_test']
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "HUSKY=0 npm ci --workspace=packages/api &&
             DATABASE_URL=postgresql://todo_user:todo_pass@postgres_test:5432/todo_test
             npm run db:migrate --workspace=packages/api"
    volumes:
      - ..:/app
    environment:
      DATABASE_URL: postgresql://todo_user:todo_pass@postgres_test:5432/todo_test
    depends_on:
      postgres_test:
        condition: service_healthy

  api_test:
    image: node:20-alpine
    working_dir: /app
    command: npm run test --workspace=packages/api
    volumes:
      - ..:/app
    environment:
      NODE_ENV: test
      TEST_DATABASE_URL: postgresql://todo_user:todo_pass@postgres_test:5432/todo_test
      JWT_SECRET: test-jwt-secret-for-ci
    depends_on:
      migrate:
        condition: service_completed_successfully
