version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: todo_dev
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_pass
    ports:
      - '5433:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U todo_user -d todo_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
      target: builder # use builder stage so tsx hot-reload works
    command: npm run dev --workspace=packages/api
    volumes:
      - ../packages/api/src:/app/packages/api/src:ro
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://todo_user:todo_pass@postgres:5432/todo_dev
      JWT_SECRET: dev-jwt-secret-not-for-production
      PORT: '3000'
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "HUSKY=0 npm ci --workspace=packages/web && npm run dev --workspace=packages/web -- --host 0.0.0.0"
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/packages/web/node_modules
      - /app/packages/api/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:3000
      API_PROXY_TARGET: http://api:3000
    ports:
      - '5173:5173'

volumes:
  postgres_dev_data:
